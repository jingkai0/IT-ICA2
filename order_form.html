<!DOCTYPE html>
<html lang="en">
    <head>

         <meta charset="UTF-8">
         <title>REShoe - Resources </title>
         <link rel="stylesheet" href="style.css">
        
    </head>

    <body>
         <h2>📄 Order Form</h2>
            <p>
                If you would like to place an order for our products, please fill out the order form below. 
                We will get back to you as soon as possible to confirm your order and provide further details.
            </p>

         <div class="resources-card">

             <form action="thankyou.html" method="get" class="resources-grid-form">
             <!-- column 1 content -->
                 <div class="resources-form-group">
                     <label for="name">Full name:</label><br>
                     <input type="text" id="name" name="name" required><br><br>

                     <label for="email">Email:</label><br>
                     <input type="email" id="email" name="email" required><br><br>

                     <label for="phone">Phone number:</label><br>
                     <input type="tel" id="phone" name="phone" required><br><br>
                 </div>
             
             <!-- column 2 content -->
                 <div class="resources-form-group">                     
                     <label for="Address">Address:</label><br>
                     <input type="text" id="Address" name="Address" required><br><br>
                 </div>

                     <input type="submit" value="Submit">
                     <input type="reset" value="Clear Form">
             </form>
         </div>

         </section>
    </body>
