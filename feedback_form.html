<!DOCTYPE html>
<html lang="en">
    <head>
         <meta charset="UTF-8">
         <title>REShoe - Resources </title>
         <link rel="stylesheet" href="style.css">
        
    </head>

    <body>
        
            <h2>💬 Feedback Form</h2>
            <p>
                We value your feedback! Please use the feedback form below to share your thoughts, suggestions, 
                or any issues you may have encountered. Your input helps us improve our products and services.
            </p>
         
         <div class="resources-card">

             <form action="tqforfeedback.html" method="get">
             <label for="name">Name:</label><br>
             <input type="text" id="name" name="name" required><br><br>

             <label for="email">Email:</label><br>
             <input type="email" id="email" name="email" required><br><br>

             <label for="address">Address:</label><br>
             <input type="text" id="address" name="address" required><br><br>

             <label for="resource">Feedback:</label><br>
             <textarea id="resource" name="resource" rows="4" cols="50" required></textarea><br><br>

             <input type="submit" value="Submit">
             <input type="reset" value="Clear Form">
 
             </form>
          </div>

    </body>
